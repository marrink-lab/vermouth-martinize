$schema: "./schema-pipeline.yaml"
martinize2:
  variables:
    - ff
  cli_flags:
    from_ff:
      default: "charmm"
      help: "Force field of the original structure."

    extra_ff_dir:
      action: append
      default: []
      type: path
      help: "Additional repository for custom force fields."

    extra_map_dir:
      action: append
      default: []
      type: path
      help: "Additional repository for mapping files."

    list_ff:
      action: store_true
      help: "List all known force fields, and exit."

    list_blocks:
      action: store_true
      help: "List all known blocks and modifications for the selected force fields."
    go:
        nargs: '?'
        const: true
        type: path
        help: Use Martini Go model.

  steps: !!omap
    - my_processors.ReadSystem:
        cli_flags:
          inpath:
            help: path to input file
            required: true
            type: path
          ignore_res:
            nargs: "+"
            default: []
            action: append
            type: ignore_resname
            help: "Ignore residues with that name: e.g. -ignore HOH,LIG (+)"
          ignore_h:
            help: ignore hydrogens
            action: store_true
            default: false
          modelidx:
            help: model number
            type: int
            default: null
        args:
          path:
            cli: inpath
          ignore_resnames:
            cli: ignore_res
          ignh:
            cli: ignore_h
          modelidx:
            cli: modelidx

    - pdb_to_universal:
        steps: !!omap
          - my_processors.MakeBondsWrapper:
              cli_flags:
                bonds_from:
                  type: str
                  choices: ["name", "distance", "none", "both"]
                  default: "both"
                  help: >
                    How to determine connectivity in the input.
                    If 'none', only bonds from the input file (CONECT) will be used.
                fudge:
                  type: float
                  default: 1.2
                  help: >
                    Factor with which Van der Waals radii should be scaled when determining
                    bonds based on distances.
              args:
                bonds_from:
                  cli: bonds_from
                fudge:
                  cli: fudge

          - vermouth.MergeNucleicStrands:
              args: {}
          - my_processors.PrintFF:
              args:
                force_field:
                  variable: ff
          - my_processors.WritePDB:
              cli_flags:
                write_graph:
                  type: path
                  required: false
                  help: "Write the graph as PDB after the MakeBonds step."
              args:
                path:
                  cli: write_graph
                omit_charges:
                  value: true
                defer_writing:
                  value: false
                nan_missing_pos:
                  value: false

          - my_processors.AnnotateMutModWrapper:
              cli_flags:
                modify:
                  action: append
                  default: []
                  help: modifications to apply to a specific residue.
                cter:
                  action: append
                  default: []
                  help: C-terminus modification for a specific c-terminus
                nter:
                  action: append
                  default: []
                  help: N-terminus modification for a specific n-terminus
                mutate:
                  action: append
                  default: []
                  help: mutate a specific amino acid into another one.
              args:
                modify:
                  cli: modify
                cter:
                  cli: cter
                nter:
                  cli: nter
                mutate:
                  cli: mutate

          - vermouth.RepairGraph:
              args:
                delete_unknown:
                  value: true
                include_graph:
                  value: false

          - my_processors.WritePDB:
              cli_flags:
                write_repair:
                  type: path
                  required: false
                  help: >
                    Write the graph as PDB after the
                    RepairGraph step. The resulting file may
                    contain "nan" coordinates making it
                    unreadable by most softwares.
              args:
                path:
                  cli: write_repair
                omit_charges:
                  value: true
                defer_writing:
                  value: false
                nan_missing_pos:
                  value: true

          - vermouth.CanonicalizeModifications:
              args: {}

          - my_processors.WritePDB:
              cli_flags:
                write_canon:
                  type: path
                  required: false
                  help: >
                    Write the graph as PDB after the
                    CanonicalizeModifications step. The
                    resulting file may contain "nan"
                    coordinates making it unreadable by most
                    software."
              args:
                path:
                  cli: write_canon
                omit_charges:
                  value: true
                defer_writing:
                  value: false
                nan_missing_pos:
                  value: true

          - vermouth.AttachMass:
              args:
                attribute:
                  value: mass

          - vermouth.SortMoleculeAtoms:
              args: {}

    - vermouth.StashAttributes:
        args:
          attributes:
            value: ["resid"]
          stash_name:
            value: "stash"

    - my_processors.Header:
        args: {}

    - choose_secstruct:
        cli_groups:
          - type: mutually_exclusive
            flags:
              dssp:
                nargs: "?"
                const: True
                help: >
                  DSSP executable for determining structure. If this flag is given
                  but no executable is specified, the mdtraj library will be used
                  to compute the secondary structure, if it can be imported.
              ss:
                type: str
                default: null
                help: >
                  (Manually set the secondary structure of the proteins.
                  Either give a dssp sequence for each residue in your input file
                  or a single letter to be repeated for the entire sequence, e.g. -ss C)
              collagen:
                action: store_true
                default: false
                help: "Use collagen parameters"
        steps: !!omap
          - my_processors.DSSPWrapper:
              condition:
                not:
                  equal:
                    cli: dssp
                    value: null
              args:
                executable:
                  cli: dssp
                savedir:
                  value: "."

          - vermouth.dssp.dssp.AnnotateMartiniSecondaryStructures:
              condition:
                not:
                  equal:
                    cli: dssp
                    value: null
              args: {}

          - my_processors.SSWrapper:
              condition:
                all:
                  - not:
                      equal:
                        cli: ss
                        value: null
                  - equal:
                      cli: dssp
                      value: null
              args:
                ss:
                  cli: ss

          - vermouth.dssp.dssp.AnnotateMartiniSecondaryStructures:
              condition:
                not:
                  equal:
                    cli: ss
                    value: null
              args: {}

          - my_processors.CollagenWrapper:
              condition:
                all:
                  - equal:
                      cli: ss
                      value: null
                  - equal:
                      cli: dssp
                      value: null
                  - equal:
                      cli: collagen
                      value: true
              args: {}

    - vermouth.SetMoleculeMeta:
        cli_flags:
          extdih:
            action: store_true
            default: false
            help: >
              Use dihedrals for extended regions, rather than elastic bonds
        args:
          extdih:
            cli: extdih

    - vermouth.SetMoleculeMeta:
        cli_flags:
          noscfix:
            action: store_true
            default: false
            help: "Don't apply side chain corrections. Please note the change in behaviour from martinize v0.11.0"
          scfix:
            action: store_true
            help: >
              Old -scfix argument. Side chain fixes are now assumed by default, and the flag does not need"
              "to be specified. Will be deprecated in future.
        args:
          scfix:
            cli: scfix

    - cystein_bridges:
        cli_flags:
          cystein_bridge:
            type: cys_argument
            default: auto
        steps: !!omap
          - vermouth.RemoveCysteinBridgeEdges:
              condition:
                equal:
                  cli: cystein_bridge
                  value: "none"
              args: {}

          - vermouth.AddCysteinBridgesThreshold:
              condition:
                all:
                  - not:
                      equal:
                        cli: cystein_bridge
                        value: "auto"
                  - not:
                      equal:
                        cli: cystein_bridge
                        value: "none"
              args:
                threshold:
                  cli: cystein_bridge

    - go_system:
        steps: !!omap
          - vermouth.MergeAllMolecules:
              condition:
                not:
                  equal:
                    cli: go
                    value: null
              args: {}

          - my_processors.GoReader:
              condition:
                all:
                  - not:
                      equal:
                        cli: go
                        value: null
                  - not:
                      equal:
                        cli: go
                        value: true
              args:
                file_path:
                  cli: go

          - vermouth.rcsu.contact_map.GenerateContactMap:
              condition:
                equal:
                  cli: go
                  value: true
              args:
                write_file:
                  cli: go_write_file