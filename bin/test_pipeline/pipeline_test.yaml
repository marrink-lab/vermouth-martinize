$schema: "./schema-pipeline.yaml"
cli_prefix: "-"

martinize2:
  steps: !!omap
    - my_processors.ReadSystem:
        cli_flags:
          inpath:
            help: path to input file
            required: true
            type: path
          ignore_res:
            help: residue names to ignore
            nargs: "*"
            default: []
          ignore_h:
            help: ignore hydrogens
            action: store_true
            default: false
          modelidx:
            help: model number
            type: int
            default: 1
        args:
          path:
            cli: inpath
          ignore_resnames:
            cli: ignore_res
          ignh:
            cli: ignore_h
          modelidx:
            cli: modelidx

    - pdb_to_universal:
        steps: !!omap
          - vermouth.MakeBonds:
              cli_flags:
                fudge:
                  type: float
                  default: 1.2
              args:
                allow_name:
                  value: true
                allow_dist:
                  value: true
                fudge:
                  cli: fudge 

          - vermouth.MergeNucleicStrands:
              args: {}

          - my_processors.WritePDB:
              cli_flags:
                write_graph:
                  type: path
                  required: false
                  help: "Write the graph as PDB after the MakeBonds step."
              args:
                path:
                  cli: write_graph
                omit_charges:
                  value: true
                defer_writing:
                  value: false  
                nan_missing_pos:
                  value: false 

          - my_processors.AnnotateMutModWrapper:
              cli_flags:
                modify:
                  action: append 
                  default: []
                  help: modifications to apply to a specific residue.
                cter:
                  action: append
                  default: []
                  help: C-terminus modification for a specific c-terminus
                nter:
                  action: append
                  default: []
                  help: N-terminus modification for a specific n-terminus 
                mutate:
                  action: append
                  default: []
                  help: mutate a specific amino acid into another one.
              args: 
                modify:
                  cli: modify
                cter: 
                  cli: cter
                nter:
                  cli: nter 
                mutate:
                  cli: mutate

          - vermouth.RepairGraph:
              args:
                delete_unknown:
                  value: true
                include_graph:
                  value: false

          - my_processors.WritePDB:
              cli_flags:
                write_repair:
                  type: path
                  required: false
                  help: > 
                        Write the graph as PDB after the 
                        RepairGraph step. The resulting file may 
                        contain "nan" coordinates making it 
                        unreadable by most softwares.
              args:
                path:
                  cli: write_repair
                omit_charges:
                  value: true
                defer_writing:  
                  value: false
                nan_missing_pos:
                  value: true 

          - vermouth.CanonicalizeModifications:
              args: {}     

          - my_processors.WritePDB:
              cli_flags:
                write_canon:
                  type: path
                  required: false
                  help: > 
                        Write the graph as PDB after the 
                        CanonicalizeModifications step. The 
                        resulting file may contain "nan" 
                        coordinates making it unreadable by most 
                        software."
              args:
                path:
                  cli: write_canon
                omit_charges:
                  value: true
                defer_writing:  
                  value: false
                nan_missing_pos:
                  value: true 

          - vermouth.AttachMass:
              args:
                attribute:
                  value: mass

          - vermouth.SortMoleculeAtoms:
              args: {}
    
    - vermouth.StashAttributes:
        args:
          attributes:
            value: ["resid"]
          stash_name:
            value: "stash"







    - martinize:
        steps: !!omap
          - my_processors.DoMappingWrapper:
              cli_flags:
                to_ff:
                  default: "martini3001"
                  help: Which forcefield to use"
              args:
                to_ff:
                  cli: to_ff
                delete_unknown:
                  value: true
                attribute_keep:
                  value: ["cgsecstruct", "chain", "aasecstruct", "resname", "stash"]
                attribute_must:
                  value: ["resname", "atype"]

          - vermouth.DoAverageBead:
              args:
                ignore_missing_graphs:
                  value: true

          - vermouth.AnnotateIDRs:
              cli_flags:
                id_regions:
                  nargs: "*"
                  default: []
              args:
                id_regions:
                  cli: id_regions

          - vermouth.DoLinks: 
              args: {}
          
          - vermouth.LocateChargeDummies:
              args: {}  

