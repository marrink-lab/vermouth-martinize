$schema: "./schema-pipeline.yaml"
cli_prefix: "-"

martinize2:
  variables:
  - target_ff
  - mappings
  cli_flags:
    to_ff:
      default: "martini3001"
      help: Which forcefield to use
    from_ff:
      default: "charmm"
      help: "Which forcefield to use"
    extra_ff_dir:
      action: append
      default: []
      type: path
      help: "Additional repository for custom force fields."
    extra_map_dir:
      action: append
      default: []
      type: path
      help: "Additional repository for mapping files."
    list_ff:
      action: store_true
      help: "List all known force fields, and exit."
    go:
      nargs: "?"
      const: true
      type: path
      help: "Use Martini Go model. Accepts either an input file from the server, or just provide the flag to calculate as part of Martinize." 
    go_write_file:  
      nargs: "?"
      const: contact_map_martinize.out
      default: false
      type: path
      help: "Write out contact map to file if calculating as part of Martinize2."
    molname:
      type: str
      default: "molecule"
      help: "Name for the output molecule. If not specified, will default to 'molecule_{0..n}' for the number of molecules in your system."
    water_bias:
          action: store_true
          default: false
          help: "Automatically apply water bias to different secondary structure elements."
    water_bias_eps:
      nargs: "+"
      type: water_bias
      default: []
      help: >
            Define the strength of the water bias by secondary structure type. 
            For example, use `H:3.6 C:2.1` to bias helixes and coils. 
            Using the idr option (e.g. idr:2.1) intrinsically disordered regions 
            are biased seperately.
    water_bias_idrs:
      nargs: "+"
      default: []
      help: >
            Intrinsically disordered regions specified by resid.
            These parts are biased differently when applying a water bias.
            format: [<chain>-]<start_resid_1>:<end_resid_1> [<chain>-]<start_resid_2>:<end_resid_2> ...
    list_blocks:
      action: store_true
      help: "List all known blocks and modifications for the selected force fields."
    elastic:
      action: store_true
      default: false
      help: "Write elastic bonds"
    rb_unit:
      type: str
      default: "molecule"
      help: >
        Establish what is the structural unit for the elastic network.
        Options are molecule, chain, all, or regions like 10:50,80:120
 

  