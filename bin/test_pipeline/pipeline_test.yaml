$schema: "./schema-pipeline.yaml"
cli_prefix: "-"

martinize2:
  cli_flags:
    to_ff:
      default: "martini3001"
      help: Which forcefield to use
    go:
      nargs: "?"
      const: true
      type: path
      help: "Use Martini Go model. Accepts either an input file from the server, or just provide the flag to calculate as part of Martinize." 
    go_write_file:  
      nargs: "?"
      const: contact_map_martinize.out
      default: false
      type: path
      help: "Write out contact map to file if calculating as part of Martinize2."
    molname:
      type: str
      default: "molecule"
      help: "Name for the output molecule. If not specified, will default to 'molecule_{0..n}' for the number of molecules in your system."

  steps: !!omap
    - my_processors.ReadSystem:
        cli_flags:
          inpath:
            help: path to input file
            required: true
            type: path
          ignore_res:
            help: residue names to ignore
            nargs: "+"
            default: []
          ignore_h:
            help: ignore hydrogens
            action: store_true
            default: false
          modelidx:
            help: model number
            type: int
            default: 1
        args:
          path:
            cli: inpath
          ignore_resnames:
            cli: ignore_res
          ignh:
            cli: ignore_h
          modelidx:
            cli: modelidx

    - pdb_to_universal:
        steps: !!omap
          - vermouth.MakeBonds:
              cli_flags:
                fudge:
                  type: float
                  default: 1.2
              args:
                allow_name:
                  value: true
                allow_dist:
                  value: true
                fudge:
                  cli: fudge 

          - vermouth.MergeNucleicStrands:
              args: {}

          - my_processors.WritePDB:
              cli_flags:
                write_graph:
                  type: path
                  required: false
                  help: "Write the graph as PDB after the MakeBonds step."
              args:
                path:
                  cli: write_graph
                omit_charges:
                  value: true
                defer_writing:
                  value: false  
                nan_missing_pos:
                  value: false 

          - my_processors.AnnotateMutModWrapper:
              cli_flags:
                modify:
                  action: append 
                  default: []
                  help: modifications to apply to a specific residue.
                cter:
                  action: append
                  default: []
                  help: C-terminus modification for a specific c-terminus
                nter:
                  action: append
                  default: []
                  help: N-terminus modification for a specific n-terminus 
                mutate:
                  action: append
                  default: []
                  help: mutate a specific amino acid into another one.
              args: 
                modify:
                  cli: modify
                cter: 
                  cli: cter
                nter:
                  cli: nter 
                mutate:
                  cli: mutate

          - vermouth.RepairGraph:
              args:
                delete_unknown:
                  value: true
                include_graph:
                  value: false

          - my_processors.WritePDB:
              cli_flags:
                write_repair:
                  type: path
                  required: false
                  help: > 
                        Write the graph as PDB after the 
                        RepairGraph step. The resulting file may 
                        contain "nan" coordinates making it 
                        unreadable by most softwares.
              args:
                path:
                  cli: write_repair
                omit_charges:
                  value: true
                defer_writing:  
                  value: false
                nan_missing_pos:
                  value: true 

          - vermouth.CanonicalizeModifications:
              args: {}     

          - my_processors.WritePDB:
              cli_flags:
                write_canon:
                  type: path
                  required: false
                  help: > 
                        Write the graph as PDB after the 
                        CanonicalizeModifications step. The 
                        resulting file may contain "nan" 
                        coordinates making it unreadable by most 
                        software."
              args:
                path:
                  cli: write_canon
                omit_charges:
                  value: true
                defer_writing:  
                  value: false
                nan_missing_pos:
                  value: true 

          - vermouth.AttachMass:
              args:
                attribute:
                  value: mass

          - vermouth.SortMoleculeAtoms:
              args: {}
    
    - vermouth.StashAttributes:
        args:
          attributes:
            value: ["resid"]
          stash_name:
            value: "stash"

    - my_processors.Header:
        args: {}
    
    - choose_secstruct:
        cli_groups:
        - type: mutually_exclusive
          flags:
              dssp:
                nargs: "?"
                const: True
                help: >
                      DSSP executable for determining structure. If this flag is given
                      but no executable is specified, the mdtraj library will be used
                      to compute the secondary structure, if it can be imported.
              ss:
                      type: str
                      default: null
                      help: >
                            (Manually set the secondary structure of the proteins. 
                            Either give a dssp sequence for each residue in your input file 
                            or a single letter to be repeated for the entire sequence, e.g. -ss C)
              collagen:
                      action: store_true
                      default: false
                      help: "Use collagen parameters"
        steps: !!omap
          - my_processors.DSSPWrapper:   
              condition:
                not:
                  equal:
                    cli: dssp
                    value: null
              args:
                executable:
                  cli: dssp
                savedir:
                  value: "."
          - my_processors.SSWrapper: 
              condition:
                all:
                  - not:
                      equal:
                        cli: ss
                        value: null
                  - equal:
                      cli: dssp
                      value: null
              args:
                ss:
                  cli: ss
          - my_processors.CollagenWrapper:
              condition:
                all:
                    - equal:
                        cli: ss
                        value: null
                    - equal:
                        cli: dssp
                        value: null
                    - equal:
                        cli: collagen
                        value: true 
              args: {}
    - vermouth.SetMoleculeMeta:
        cli_flags:
          extdih:
            action: store_true
            default: false
            help: > 
                  Use dihedrals for extended regions, rather than elastic bonds
        args:
          extdih:
            cli: extdih 

    - vermouth.SetMoleculeMeta:
        cli_flags:
          noscfix:
            action: store_true
            default: false
            help: "Don't apply side chain corrections. Please note the change in behaviour from martinize v0.11.0"
          scfix:
            action: store_true 
            help: >
                  Old -scfix argument. Side chain fixes are now assumed by default, and the flag does not need"
                  "to be specified. Will be deprecated in future.
        args:
          scfix:
            cli: scfix
    - cystein_bridges:
        cli_flags:
          cystein_bridge:
            type: cys_argument
            default: auto
        steps: !!omap
          - vermouth.RemoveCysteinBridgeEdges:
              condition:
                equal:
                  cli: cystein_bridge
                  value: "none"
              args: {}
          - vermouth.AddCysteinBridgesThreshold:
              condition:
                all:
                  - not: 
                      equal:
                        cli: cystein_bridge
                        value:  "auto"
                  - not:
                      equal:
                        cli: cystein_bridge
                        value: "none"
              args:
                threshold:
                  cli : cystein_bridge
    - go_system:       
        steps: !!omap
          - vermouth.MergeAllMolecules:                                         
              condition:
                not:
                  equal:
                    cli: go
                    value: null 
              args: {}
          - my_processors.GoWrapper:
              condition:
                not:
                  equal:
                    cli: go
                    value: null
              args:
                go:
                  cli: go
                go_write_file:
                  cli: go_write_file

    - martinize:
        steps: !!omap
          - my_processors.DoMappingWrapper:
              args:
                to_ff:
                  cli: to_ff
                delete_unknown:
                  value: true
                attribute_keep:
                  value: ["cgsecstruct", "chain", "aasecstruct", "resname", "stash"]
                attribute_must:
                  value: ["resname", "atype"]

          - vermouth.DoAverageBead:
              args:
                ignore_missing_graphs:
                  value: true

          - vermouth.AnnotateIDRs:
              cli_flags:
                id_regions:
                  nargs: "*"
                  default: []
              args:
                id_regions:
                  cli: id_regions

          - vermouth.DoLinks: 
              args: {}
          
          - vermouth.LocateChargeDummies:
              args: {}  

    - my_processors.RTPPolisherWrapper:
        args:
          to_ff:
            cli: to_ff
    - my_processors.ApplyPosresWrapper:
        condition:
          not:
            equal:
              cli: posres
              value: "none"
        cli_flags:
          posres:
            type: str
            default: "none"
            choices: ["none", "all", "backbone"]
            help: "Output position restraints (none/all/backbone)"
          posres_fc:
            type: float
            default: 1000.0
            help: "Position restraints force constant in kJ/mol/nm^2"
        args:
          posres:
            cli: posres
          posres_fc:
            cli: posres_fc

    - my_processors.GoModelWrapper:
        condition:
          not:
            equal:
              cli: go
              value: null
        cli_flags:
          go_low:
            type: float
            default: 0.3
            help: "Minimum distance (nm) below which contacts are removed."
          go_up:
            type: float
            default: 1.1
            help: "Maximum distance (nm) above which contacts are removed."
          go_res_dist:
            type: int
            default: 3
            help: "Minimum graph distance (similar sequence distance) below which contacts are removed." 
          go_backbone:
            type: str
            default: "BB"
            help: "Name of protein backbone bead on which to place a virtual interaction go site"
          go_atomname:
            type: str
            default: "CA"
            help: "Name of the virtual interaction go site atom"
          go_eps:
            type: float
            default: 9.414
            help: "The strength of the Go model structural bias in kJ/mol."
          water_bias:
            action: store_true
            default: false
            help: "Automatically apply water bias to different secondary structure elements."
          water_bias_eps:
            nargs: "+"
            type: water_bias
            default: []
            help: >
                  Define the strength of the water bias by secondary structure type. 
                  For example, use `H:3.6 C:2.1` to bias helixes and coils. 
                  Using the idr option (e.g. idr:2.1) intrinsically disordered regions 
                  are biased seperately.
          water_bias_idr:
            nargs: "+"
            default: []
            help: >
                  Intrinsically disordered regions specified by resid.
                  These parts are biased differently when applying a water bias.
                  format: [<chain>-]<start_resid_1>:<end_resid_1> [<chain>-]<start_resid_2>:<end_resid_2> ...
        args:
          go_low:
            cli: go_low
          go_up:
            cli: go_up
          go_res_dist:
            cli: go_res_dist 
          go_backbone:    
            cli: go_backbone
          go_atomname:
            cli: go_atomname
          molname:
            cli: molname
          go_eps:
            cli: go_eps
          water_bias:
            cli: water_bias
          water_bias_eps:
            cli: water_bias_eps
          water_bias_idr:
            cli: water_bias_idr
    
    - my_processors.MergeChainsWrapper:
        condition:
          not:
            equal: 
              cli: merge_chains
              value: None 
        cli_flags:
          merge_chains:
            type: str
            action: append
            default: []
            help: > 
                    Merge chains: either a comma separated list of chains to merge e.g. -merge A,B,C (+), or -merge all\n
                    if instead all chains in the input file should be merged.\n
                    Can be given multiple times for different groups of chains to merge.
        args:
          merge_chains:
            cli: merge_chains
    - vermouth.NameMolType:
        condition:
          equal:
            cli: go
            value: null
        cli_flags:
          keep_duplicate_itp:
            action: store_true
            default: false
            help: "Write separate topologies for identical chains"
          deduplicate:
            action: store_true
            default: false
            help: "internal"
        args:
          deduplicate:
            cli: deduplicate
          molname:
            cli: molname
    - my_processors.ElasticWrapper:
        condition:
          equal:
            cli: elastic
            value: true
        cli_flags:
          elastic:
            action: store_true
            default: false
            help: "Write elastic bonds"
          rb_force_constant:
            type: float 
            default: 700.0
            help: "Elastic bond force constant Fc in kJ/mol/nm^2"
          rb_lower_bound:
            type: float
            default: 0.0
            help: "Elastic bond lower cutoff: F = Fc if rij < lo"
          rb_upper_bound:
            type: float
            default: 0.9
            help: "Elastic bond upper cutoff: F = 0 if rij > up"
          res_min_dist:
            type: int
            default: null
            help: "The minimum separation between two residues to have an RB"
          rb_decay_factor:
            type: float
            default: 0
            help: "Elastic bond decay factor a"
          rb_decay_power:
            type: float
            default: 1
            help: "Elastic bond decay power p"
          rb_minimum_force:
            type: float
            default: 0
            help: "Remove elastic bonds with force constant lower than this"
          rb_selection:
            default: null
            type: str
            help: "Comma separated list of bead names for elastic bonds"
          rb_unit:
            type: str
            default: "molecule"
            help: >
              Establish what is the structural unit for the elastic network.
              Options are molecule, chain, all, or regions like 10:50,80:120
        args:
          rb_force_constant:
            cli: rb_force_constant
          rb_lower_bound:
            cli: rb_lower_bound
          rb_upper_bound:
            cli: rb_upper_bound
          rb_decay_factor:
            cli: rb_decay_factor
          rb_decay_power:
            cli: rb_decay_power
          rb_minimum_force:
            cli: rb_minimum_force
          rb_selection:
            cli: rb_selection
          rb_unit:
            cli: rb_unit
          res_min_dist:
            cli: res_min_dist
            